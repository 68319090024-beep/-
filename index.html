<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibration Monitoring System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body class="bg-gray-100 font-sans">

    <div class="max-w-4xl mx-auto p-5">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-gray-800">ระบบตรวจจับการสั่นสะเทือน</h1>
            <p class="text-gray-500">Real-time Vibration Monitoring Dashboard</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="bg-white rounded-xl shadow-md p-6 flex flex-col items-center">
                <h2 class="text-lg font-semibold text-gray-600 mb-2">สถานะปัจจุบัน</h2>
                <div id="current-status" class="text-2xl font-bold px-6 py-2 rounded-full bg-gray-200 text-gray-600">
                    รอข้อมูล...
                </div>
            </div>
            
            <div class="bg-white rounded-xl shadow-md p-6 flex flex-col items-center">
                <h2 class="text-lg font-semibold text-gray-600 mb-2">อัปเดตล่าสุด</h2>
                <div id="last-update" class="text-xl font-medium text-blue-600">
                    -
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="bg-gray-800 p-4">
                <h2 class="text-white font-semibold">ประวัติการตรวจพบ (Log History)</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b">
                            <th class="p-4 font-semibold text-gray-700">ลำดับ</th>
                            <th class="p-4 font-semibold text-gray-700">สถานะ</th>
                            <th class="p-4 font-semibold text-gray-700">เวลา (Millis)</th>
                        </tr>
                    </thead>
                    <tbody id="log-table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- แก้ไข: นำ Config ของคุณมาวางที่นี่เรียบร้อยแล้ว ---
        const firebaseConfig = {
            apiKey: "AIzaSyBwh0ZMx-DgeN3KVKcy0AiaFGKASSvabEc",
            authDomain: "kunthida-3e706.firebaseapp.com",
            databaseURL: "https://kunthida-3e706-default-rtdb.firebaseio.com",
            projectId: "kunthida-3e706",
            storageBucket: "kunthida-3e706.firebasestorage.app",
            messagingSenderId: "1021544148662",
            appId: "1:1021544148662:web:7b38a8f8755945e0788017",
            measurementId: "G-QNYFGCF7CB"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // --- ดึงข้อมูลจาก Path: /vibration_log ---
        const logRef = database.ref('/vibration_log');

        logRef.limitToLast(10).on('value', (snapshot) => {
            const tbody = document.getElementById('log-table-body');
            const currentStatus = document.getElementById('current-status');
            const lastUpdate = document.getElementById('last-update');
            
            tbody.innerHTML = ''; 
            
            let count = 1;
            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                
                // สร้างแถวตาราง
                const row = `
                    <tr class="border-b hover:bg-gray-50 transition">
                        <td class="p-4">${count++}</td>
                        <td class="p-4">
                            <span class="px-3 py-1 rounded-full text-sm font-medium ${data.status === 'ALERT' ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">
                                ${data.status}
                            </span>
                        </td>
                        <td class="p-4 text-gray-600">${data.time}</td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('afterbegin', row); 

                // อัปเดตการ์ดสถานะล่าสุด
                currentStatus.innerText = data.status;
                if(data.status === 'ALERT') {
                    currentStatus.className = "text-2xl font-bold px-6 py-2 rounded-full bg-red-500 text-white animate-pulse";
                } else {
                    currentStatus.className = "text-2xl font-bold px-6 py-2 rounded-full bg-green-500 text-white";
                }
                lastUpdate.innerText = new Date().toLocaleTimeString();
            });
        });
    </script>
</body>
</html>
